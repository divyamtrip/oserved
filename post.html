<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="keywords" content="" />
<meta name="description" content="Read article on 0served" id="meta-description" />
<meta http-equiv="content-type" content="text/html; charset=utf-8" />
<title>0served</title>
<link rel="icon" type="image/png" href="favicon.png" />
<link href='https://fonts.googleapis.com/css?family=Archivo+Narrow:400,700|Open+Sans:400,300' rel='stylesheet' type='text/css' />
<link href="style.css?v=2" rel="stylesheet" type="text/css" media="screen" />
<!-- Client-side Markdown Compiler -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
<div id="wrapper">
	<div id="header-wrapper">
		<div id="header" class="container">
			<div id="logo">
				<h1><a href="index.html">0served </a></h1>
			</div>
			<div id="menu">
				<ul>
					<li><a href="index.html">Home</a></li>
                    <li><a href="research.html">Research</a></li>
                    <li><a href="archive.html">Archive</a></li>
                    <li><a href="about.html">About</a></li>
				</ul>
			</div>
		</div>
		<div id="banner">
			<div class="content"><img src="images/img02.jpg" width="1200" height="300" alt="" /></div>
		</div>
	</div>
	<!-- end #header -->
	
	<div id="page">
		<div id="content">
			<div class="post">
				<h2 class="title" id="post-title">Loading post...</h2>
				<p class="meta" id="post-meta"><span class="date" id="post-date"></span> &nbsp;|&nbsp; <span id="post-category"></span></p>
				<div style="clear: both;">&nbsp;</div>
				<div class="entry" id="post-entry">
					<p>Please wait while the publication content loads...</p>
				</div>
			</div>
		</div>
		<!-- end #content -->
		<div id="sidebar">
			<h2>Recent Research</h2>
			<ul class="list-style1" id="recent-posts-list">
				<li>Loading...</li>
			</ul>
		</div>
		<!-- end #sidebar -->
		<div style="clear: both;">&nbsp;</div>
	</div>
	<!-- end #page --> 
</div>
<div id="footer">
	<p>&copy; 2026 0served. Template adapted from TEMPLATED.</p>
</div>
<!-- end #footer -->

<script type="text/javascript">
//<![CDATA[
document.addEventListener("DOMContentLoaded", () => {
    const params = new URLSearchParams(window.location.search);
    const postId = params.get('id');

    if (!postId) {
        document.getElementById('post-title').textContent = "Post Not Found";
        document.getElementById('post-entry').innerHTML = "<p>No post identifier was provided. Please return to the <a href='index.html'>homepage</a>.</p>";
        loadRecentPosts([]);
        return;
    }

    // Fetch publications database
    fetch('posts.json')
        .then(response => {
            if (!response.ok) {
                throw new Error("Could not load posts dataset.");
            }
            return response.json();
        })
        .then(posts => {
            const post = posts.find(p => p.id === postId);
            
            if (!post) {
                document.getElementById('post-title').textContent = "Publication Not Found";
                document.getElementById('post-entry').innerHTML = `<p>The requested publication "${postId}" does not exist or has been moved. Return to <a href='index.html'>homepage</a>.</p>`;
                loadRecentPosts(posts);
                return;
            }

            // Update title & SEO Meta
            document.title = `${post.title} — 0served`;
            document.getElementById('meta-description').setAttribute('content', post.summary || '');

            // Update DOM elements
            document.getElementById('post-title').textContent = post.title;
            document.getElementById('post-date').textContent = post.date;
            document.getElementById('post-category').textContent = post.category;

            const entryEl = document.getElementById('post-entry');
            if (post.isForthcoming) {
                entryEl.innerHTML = `
                    <p><em>${post.summary}</em></p>
                    <hr style="border: 0; border-top: 1px solid #E7EBED; margin: 30px 0;" />
                    <p><strong>Status: Publication pending.</strong> This report or essay is currently scheduled for release. Check back here, or follow 0served for updates.</p>
                `;
            } else {
                // Parse markdown content
                try {
                    if (typeof marked !== 'undefined') {
                        entryEl.innerHTML = marked.parse(post.content);
                    } else {
                        // Fallback simple line breaker if CDN fails
                        entryEl.innerHTML = post.content.split('\n\n').map(p => `<p>${p.replace(/\n/g, '<br/>')}</p>`).join('');
                    }
                } catch (e) {
                    entryEl.textContent = post.content;
                }
            }

            // Load sidebar widget
            loadRecentPosts(posts, postId);
        })
        .catch(err => {
            console.error(err);
            document.getElementById('post-title').textContent = "Error Loading Content";
            document.getElementById('post-entry').innerHTML = "<p>There was a problem loading the database. Please try reloading the page.</p>";
        });

    function loadRecentPosts(posts, currentId = null) {
        const listEl = document.getElementById('recent-posts-list');
        listEl.innerHTML = '';

        // Filter out the current post, only show published/forthcoming ones
        const list = posts.filter(p => p.id !== currentId).slice(0, 5);

        if (list.length === 0) {
            listEl.innerHTML = '<li>No other research available.</li>';
            return;
        }

        list.forEach(p => {
            const li = document.createElement('li');
            li.style.borderBottom = '1px solid #E7EBED';
            li.style.padding = '8px 0';
            
            const link = document.createElement('a');
            link.href = `post.html?id=${p.id}`;
            link.textContent = p.title;
            link.style.textDecoration = 'none';
            link.style.color = '#5E5E5E';
            link.style.fontWeight = '400';
            
            const meta = document.createElement('span');
            meta.style.display = 'block';
            meta.style.fontSize = '11px';
            meta.style.color = '#8E8E8E';
            meta.style.fontStyle = 'italic';
            meta.textContent = `${p.category} — ${p.date}`;

            li.appendChild(link);
            li.appendChild(meta);
            listEl.appendChild(li);
        });
    }
});
//]]>
</script>
</body>
</html>
