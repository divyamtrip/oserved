<script type="text/javascript">
//<![CDATA[
document.addEventListener("DOMContentLoaded", () => {
    fetch('posts.json')
        .then(response => {
            if (!response.ok) throw new Error("Could not load posts");
            return response.json();
        })
        .then(posts => {
            const listEl = document.getElementById('research-posts');
            listEl.innerHTML = '';
            
            if (posts.length === 0) {
                listEl.innerHTML = '<p>No research reports published yet.</p>';
                return;
            }

            posts.forEach(post => {
                const postDiv = document.createElement('div');
                postDiv.className = 'post';
                
                const linkHref = `post.html?id=${post.id}`;
                
                postDiv.innerHTML = `
                    <h2 class="title"><a href="${linkHref}">${post.title}</a></h2>
                    <p class="meta"><span class="date">${post.date}</span> &nbsp;|&nbsp; <span>${post.category}</span></p>
                    <div style="clear: both;">&nbsp;</div>
                    <div class="entry">
                        <p>${post.summary}</p>
                        ${post.isForthcoming ? `<p style="margin-top: 15px;"><strong>Status: Publication pending.</strong></p>` : `<a href="${linkHref}" class="more" style="margin-top: 15px;">Read Full Post</a>`}
                    </div>
                `;
                listEl.appendChild(postDiv);
            });

            // Load sidebar widget
            const sidebarList = document.getElementById('recent-posts-list');
            sidebarList.innerHTML = '';
            posts.slice(0, 6).forEach(p => {
                const li = document.createElement('li');
                li.style.borderBottom = '1px solid #E7EBED';
                li.style.padding = '8px 0';
                
                const link = document.createElement('a');
                link.href = `post.html?id=${p.id}`;
                link.textContent = p.title;
                link.style.textDecoration = 'none';
                link.style.color = '#5E5E5E';
                link.style.fontWeight = '400';
                
                const meta = document.createElement('span');
                meta.style.display = 'block';
                meta.style.fontSize = '11px';
                meta.style.color = '#8E8E8E';
                meta.style.fontStyle = 'italic';
                meta.textContent = `${p.category} — ${p.date}`;

                li.appendChild(link);
                li.appendChild(meta);
                sidebarList.appendChild(li);
            });
        })
        .catch(err => {
            console.error('Error loading posts:', err);
            document.getElementById('research-posts').innerHTML = '<p>Error loading publications database.</p>';
        });
});
//]]>
</script>
