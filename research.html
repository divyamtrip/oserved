<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="Research — 0served independent research publication." />
<meta http-equiv="content-type" content="text/html; charset=utf-8" />
<title>Research — 0served</title>
<link rel="icon" type="image/png" href="favicon.png" />
<link href='https://fonts.googleapis.com/css?family=Archivo+Narrow:400,700|Open+Sans:400,300|Oswald:300,400' rel='stylesheet' type='text/css' />
<link href="style.css?v=3" rel="stylesheet" type="text/css" />
</head>
<body>

<div id="wrapper">

  <!-- ============ HEADER ============ -->
  <div id="header-wrapper">
    <div id="header">
      <div id="logo">
        <h1><a href="index.html">0served</a></h1>
      </div>
      <button class="menu-toggle" id="menu-toggle" aria-label="Toggle navigation" aria-expanded="false" onclick="toggleMenu()">
        <span></span><span></span><span></span>
      </button>
      <nav id="menu" role="navigation">
        <ul>
          <li><a href="index.html">Home</a></li>
          <li class="current_page_item"><a href="research.html">Research</a></li>
          <li><a href="archive.html">Archive</a></li>
          <li><a href="about.html">About</a></li>
        </ul>
      </nav>
    </div>
    <div id="banner">
      <div class="content"><img src="images/img02.jpg" alt="0served Research" /></div>
    </div>
  </div>

  <!-- ============ PAGE GRID ============ -->
  <div id="page">

    <div id="content">
      <div id="research-posts">
        <p style="color:#AAA;">Loading research publications&hellip;</p>
      </div>
    </div>

    <div id="sidebar">
      <div class="sidebar-widget">
        <h2>Recent Research</h2>
        <ul id="recent-posts-list" style="margin:0;padding:0;list-style:none;">
          <li style="color:#AAA;font-size:13px;">Loading&hellip;</li>
        </ul>
      </div>
      <div class="sidebar-widget">
        <h2>Newsletter</h2>
        <p style="font-size:13px;color:#777;margin-bottom:14px;line-height:1.5;">Subscribe for new research.</p>
        <form class="sidebar-newsletter-form" id="nl-form-research" onsubmit="subscribeResearch(event)">
          <input type="email" class="sidebar-newsletter-input" placeholder="Your email address" required autocomplete="email" />
          <button type="submit" class="sidebar-newsletter-btn">Subscribe</button>
        </form>
        <div class="sidebar-newsletter-msg" id="nl-msg-research"></div>
      </div>
    </div>

  </div>
</div>

<div id="footer">
  <p id="footer-text">&copy; 2026 0served. Template adapted from <a href="https://templated.co" rel="nofollow">TEMPLATED</a>.</p>
</div>

<script>
function toggleMenu() {
  const menu = document.getElementById('menu');
  const btn  = document.getElementById('menu-toggle');
  const open = menu.classList.toggle('open');
  btn.classList.toggle('active', open);
  btn.setAttribute('aria-expanded', open);
}

async function subscribeResearch(e) {
  e.preventDefault();
  const msgEl = document.getElementById('nl-msg-research');
  const email = e.target.querySelector('input').value;
  try {
    const data = await fetch('site-content.json').then(r => r.json()).catch(() => ({}));
    const fId  = data.settings?.newsletterFormId;
    if (!fId || fId === 'YOUR_FORMSPREE_ID') {
      msgEl.textContent = 'Newsletter coming soon!'; msgEl.className = 'sidebar-newsletter-msg note'; return;
    }
    const res = await fetch(`https://formspree.io/f/${fId}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Accept: 'application/json' },
      body: JSON.stringify({ email })
    });
    msgEl.textContent = res.ok ? '✓ Subscribed!' : 'Error — try again.';
    msgEl.className = 'sidebar-newsletter-msg ' + (res.ok ? 'success' : 'error');
    if (res.ok) e.target.reset();
  } catch { msgEl.textContent = 'Connection error.'; msgEl.className = 'sidebar-newsletter-msg error'; }
}

document.addEventListener('DOMContentLoaded', () => {
  fetch('posts.json')
    .then(r => { if (!r.ok) throw new Error(); return r.json(); })
    .then(posts => {
      /* Main content */
      const listEl = document.getElementById('research-posts');
      listEl.innerHTML = '';
      if (posts.length === 0) { listEl.innerHTML = '<p>No research reports published yet.</p>'; return; }

      posts.forEach(post => {
        const div = document.createElement('div');
        div.className = 'post';
        const href = `post.html?id=${post.id}`;
        div.innerHTML = `
          <h2 class="title"><a href="${href}">${post.title}</a></h2>
          <p class="meta"><span class="date">${post.date}</span> &nbsp;&mdash;&nbsp; <span>${post.category}</span></p>
          <div style="clear:both;">&nbsp;</div>
          <div class="entry">
            <p>${post.summary}</p>
            ${post.isForthcoming
              ? `<p><strong>Status: Publication pending.</strong></p>`
              : `<a href="${href}" class="more">Read Full Article</a>`}
          </div>
        `;
        listEl.appendChild(div);
      });

      /* Sidebar */
      const sidebarEl = document.getElementById('recent-posts-list');
      sidebarEl.innerHTML = '';
      posts.slice(0, 7).forEach(p => {
        const li = document.createElement('li');
        li.innerHTML = `
          <a href="post.html?id=${p.id}">${p.title}</a>
          <span>${p.category} &mdash; ${p.date}</span>
        `;
        sidebarEl.appendChild(li);
      });
    })
    .catch(() => { document.getElementById('research-posts').innerHTML = '<p>Error loading publications.</p>'; });
});
</script>
</body>
</html>
